name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-

      - name: Generate runtime Supabase config
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ONLINE_MATCH_API_BASE_URL: ${{ secrets.ONLINE_MATCH_API_BASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$ONLINE_MATCH_API_BASE_URL" ]; then
            echo "Missing Supabase runtime configuration secrets." >&2
            exit 1
          fi
          mkdir -p Assets/Resources
          cat > Assets/Resources/SupabaseConfig.asset <<EOF
          %YAML 1.1
          %TAG !u! tag:unity3d.com,2011:
          --- !u!114 &11400000
          MonoBehaviour:
            m_ObjectHideFlags: 0
            m_CorrespondingSourceObject: {fileID: 0}
            m_PrefabInstance: {fileID: 0}
            m_PrefabAsset: {fileID: 0}
            m_GameObject: {fileID: 0}
            m_Enabled: 1
            m_EditorHideFlags: 0
            m_Script: {fileID: 11500000, guid: 16db0829b337478a919aca3bba2913af, type: 3}
            m_Name: SupabaseConfig
            m_EditorClassIdentifier: 
            SupabaseUrl: ${SUPABASE_URL}
            AnonKey: ${SUPABASE_ANON_KEY}
            OnlineMatchApiBaseUrl: ${ONLINE_MATCH_API_BASE_URL}
            EdgegapLobbyUrl: 
            OnlineConnectionMode: 1
            UseEdgegapDedicatedServer: 0
            EdgegapDedicatedHost: bf5855a39bca.pr.edgegap.net
            EdgegapDedicatedUdpPort: 30685
            EdgegapDedicatedServerListenPort: 7777
            ProfilesTable: profiles
            RoomsTable: rooms
            RequestTimeout: 10
          EOF
          cat > Assets/Resources/SupabaseConfig.asset.meta <<EOF
          fileFormatVersion: 2
          guid: 43fce686722444a3b17c0a1d9471bf0a
          NativeFormatImporter:
            externalObjects: {}
            mainObjectFileID: 11400000
            userData: 
            assetBundleName: 
            assetBundleVariant: 
          EOF

      - name: Build Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: ${{ github.event.repository.name }}-${{ matrix.targetPlatform }}
          versioning: Tag

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Zip builds
        run: |
          mkdir -p release
          for dir in artifacts/Build-*/; do
            platform=$(basename "$dir" | sed 's/Build-//')
            zip -r "release/${platform}.zip" "$dir"
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

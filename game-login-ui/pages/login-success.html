  @theme inline {
    --color-background: rgb(10,10,10);
    --color-foreground: rgb(250,250,250);
    --color-card: rgb(23,23,23);
    --color-card-foreground: rgb(250,250,250);
    --color-popover: rgb(38,38,38);
    --color-popover-foreground: rgb(250,250,250);
    --color-primary: rgb(229,229,229);
    --color-primary-foreground: rgb(23,23,23);
    --color-secondary: rgb(38,38,38);
    --color-secondary-foreground: rgb(250,250,250);
    --color-muted: rgb(38,38,38);
    --color-muted-foreground: rgb(161,161,161);
    --color-accent: rgb(64,64,64);
    --color-accent-foreground: rgb(250,250,250);
    --color-destructive: rgb(255,100,103);
    --color-destructive-foreground: rgb(250,250,250);
    --color-border: rgb(40,40,40);
    --color-input: rgb(52,52,52);
    --color-ring: rgb(115,115,115);
    --color-chart-1: rgb(145,197,255);
    --color-chart-2: rgb(58,129,246);
    --color-chart-3: rgb(37,99,239);
    --color-chart-4: rgb(26,78,218);
    --color-chart-5: rgb(31,63,173);
    --radius-sm: 8px;
    --radius-md: 8px;
    --radius-lg: 8px;
    --radius-xl: 8px;
  }
  @layer base {
    body { background: rgb(10,10,10); color: rgb(250,250,250); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;

<body class="min-h-screen font-sans antialiased" style="margin:0;">
    <main class="w-screen h-screen flex items-center justify-center overflow-hidden">
      <div class="flex flex-col items-center px-6">
        <!-- Success icon -->
        <div class="flex items-center justify-center w-16 h-16 text-foreground">
          <i data-lucide="circle-check" class="w-16 h-16"></i>
        </div>

        <!-- Heading -->
        <h1 class="font-serif text-2xl text-card-foreground text-center mt-6">
          欢迎回来
        </h1>

        <!-- Subtitle -->
        <p class="text-sm text-muted-foreground text-center mt-1">
          你已成功登录奥义传说
        </p>

        <!-- Divider -->
        <div class="border-b border-border my-8 max-w-xs w-full"></div>

        <!-- User info card -->
        <div class="bg-card border border-border rounded-md p-4 max-w-sm w-full">
          <div class="flex items-center gap-3">
            <!-- Avatar -->
            <div class="flex items-center justify-center w-10 h-10 rounded-full bg-secondary text-muted-foreground">
              <i data-lucide="user" class="w-5 h-5"></i>
            </div>
            <!-- User info -->
            <div class="flex flex-col">
              <span class="text-sm text-card-foreground font-medium">玩家名称</span>
              <span class="text-xs text-muted-foreground">player@example.com</span>
            </div>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="flex gap-3 justify-center max-w-sm w-full mt-6">
          <button class="flex-1 bg-primary text-primary-foreground rounded-md py-2.5 text-sm font-medium hover:opacity-90 transition-opacity cursor-pointer">
            进入主页
          </button>
          <button class="flex-1 border border-border bg-card text-card-foreground rounded-md py-2.5 text-sm font-medium hover:bg-secondary transition-colors cursor-pointer">
            管理账号
          </button>
        </div>

        <!-- Auto-redirect hint -->
        <p class="text-xs text-muted-foreground text-center mt-8">
          即将跳转到主页...
        </p>
      </div>
    </main>
    <script>lucide.createIcons();</script>

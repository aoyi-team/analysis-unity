<body class="font-sans antialiased overflow-hidden" style="margin:0; padding:0;">
    <main class="flex w-screen h-screen items-center justify-center bg-background">
      <div class="w-full max-w-[400px] mx-4 bg-card border border-border rounded-md p-8">
        <h1 class="font-serif text-2xl tracking-tight text-card-foreground">奥义联盟</h1>
        <p class="text-sm text-muted-foreground mt-1">登录到你的账号</p>
        <div class="border-b border-border my-6"></div>
        <form onsubmit="return false;" class="flex flex-col gap-4">
          <div>
            <label class="block text-xs text-muted-foreground mb-1.5">邮箱</label>
            <input type="email" placeholder="name@example.com" class="w-full bg-input border border-border text-card-foreground placeholder-muted-foreground px-3 py-2 text-sm outline-none transition-colors focus:ring-1 focus:ring-ring focus:border-ring rounded-md">
          </div>
          <div>
            <label class="block text-xs text-muted-foreground mb-1.5">密码</label>
            <div class="relative">
              <input type="password" id="password-input" placeholder="输入密码" class="w-full bg-input border border-border text-card-foreground placeholder-muted-foreground px-3 py-2 pr-10 text-sm outline-none transition-colors focus:ring-1 focus:ring-ring focus:border-ring rounded-md">
              <button type="button" onclick="togglePassword()" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors" aria-label="显示密码">
                <i data-lucide="eye" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-1.5 text-xs text-muted-foreground cursor-pointer">
              <input type="checkbox" class="rounded border-border bg-input">
              <span>记住我</span>
            </label>
            <a href="#" class="text-xs text-muted-foreground hover:text-foreground transition-colors">忘记密码?</a>
          </div>
          <button type="submit" class="w-full bg-primary text-primary-foreground font-medium text-sm py-2.5 rounded-md hover:opacity-90 transition-opacity cursor-pointer">登录</button>
        </form>
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-border"></div>
          <span class="text-xs text-muted-foreground whitespace-nowrap">其他登录方式</span>
          <div class="flex-1 h-px bg-border"></div>
        </div>
        <div class="flex items-center justify-center gap-3">
          <button type="button" class="w-10 h-10 flex items-center justify-center border border-border bg-card hover:bg-secondary hover:border-accent transition-colors rounded-md" aria-label="QQ登录">
            <svg class="w-5 h-5 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3C8.5 3 6 5.5 6 9v2c-1.5 1-2 3-2 5 0 1.5.5 2.5 1.5 3 .5.5 1.5 1 2.5 1 .5 1 1.5 1.5 4 1.5s3.5-.5 4-1.5c1 0 2-.5 2.5-1 1-.5 1.5-1.5 1.5-3 0-2-.5-4-2-5V9c0-3.5-2.5-6-6-6z"></path>
            </svg>
          </button>
          <button type="button" class="w-10 h-10 flex items-center justify-center border border-border bg-card hover:bg-secondary hover:border-accent transition-colors rounded-md" aria-label="微信登录">
            <svg class="w-5 h-5 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 4C5.5 4 3 6.5 3 9.5c0 1.5.7 2.8 1.8 3.8L4 16l2.8-1.4c.7.2 1.4.4 2.2.4"></path>
              <path d="M15 10c-3.3 0-6 2.2-6 5s2.7 5 6 5c.7 0 1.3-.1 2-.3L19.5 21l-1-2.3c1-.9 1.5-2.1 1.5-3.5 0-2.8-2.7-5.2-4.5-5.2z"></path>
            </svg>
          </button>
          <button type="button" class="w-10 h-10 flex items-center justify-center border border-border bg-card hover:bg-secondary hover:border-accent transition-colors rounded-md" aria-label="Google登录">
            <svg class="w-5 h-5 text-muted-foreground" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"></path>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
            </svg>
          </button>
          <button type="button" class="w-10 h-10 flex items-center justify-center border border-border bg-card hover:bg-secondary hover:border-accent transition-colors rounded-md" aria-label="GitHub登录">
            <i data-lucide="github" class="w-5 h-5 text-muted-foreground"></i>
          </button>
        </div>
        <p class="text-center mt-6 text-xs text-muted-foreground">
          还没有账号？
          <a href="#" data-dom-id="link-to-register" class="text-foreground hover:underline transition-colors">立即注册</a>
        </p>
      </div>
    </main>
    <script>
      function togglePassword() {
        var input = document.getElementById('password-input');
        var btn = input.parentElement.querySelector('button');
        if (input.type === 'password') {
          input.type = 'text';
          btn.setAttribute('aria-label', '隐藏密码');
        } else {
          input.type = 'password';
          btn.setAttribute('aria-label', '显示密码');
        }
      }
    </script>
    <script>lucide.createIcons();</script>
</body>

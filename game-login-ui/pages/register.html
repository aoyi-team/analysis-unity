<body class="font-sans antialiased overflow-hidden" style="margin:0; padding:0;">
    <main class="flex w-screen h-screen items-center justify-center bg-background">
      <div class="w-full max-w-[400px] mx-4 bg-card border border-border rounded-md p-8 overflow-y-auto" style="max-height: 92vh; width: 380px; height: 560px;">
        <h1 class="font-serif text-2xl tracking-tight text-center text-card-foreground">奥义联盟</h1>
        <p class="text-sm text-center text-muted-foreground mt-1">创建新账号</p>
        <div class="border-b border-border my-6"></div>
        <form onsubmit="return false;" class="flex flex-col gap-4">
          <div>
            <label class="block text-xs text-muted-foreground mb-1.5">用户名</label>
            <input type="text" placeholder="请输入用户名" autocomplete="username" class="w-full bg-input border border-border text-card-foreground placeholder-muted-foreground px-3 py-2 text-sm outline-none transition-colors rounded-md focus:ring-1 focus:ring-ring focus:border-ring">
          </div>
          <div>
            <label class="block text-xs text-muted-foreground mb-1.5">邮箱</label>
            <input type="email" placeholder="name@example.com" autocomplete="email" class="w-full bg-input border border-border text-card-foreground placeholder-muted-foreground px-3 py-2 text-sm outline-none transition-colors rounded-md focus:ring-1 focus:ring-ring focus:border-ring">
          </div>
          <div>
            <label class="block text-xs text-muted-foreground mb-1.5">密码</label>
            <div class="relative">
              <input type="password" id="reg-password" placeholder="设置密码" autocomplete="new-password" class="w-full bg-input border border-border text-card-foreground placeholder-muted-foreground px-3 py-2 pr-10 text-sm outline-none transition-colors rounded-md focus:ring-1 focus:ring-ring focus:border-ring">
              <button type="button" id="toggle-reg-password" aria-label="切换密码可见性" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors">
                <i data-lucide="eye" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs text-muted-foreground mb-1.5">确认密码</label>
            <div class="relative">
              <input type="password" id="reg-confirm-password" placeholder="再次输入密码" autocomplete="new-password" class="w-full bg-input border border-border text-card-foreground placeholder-muted-foreground px-3 py-2 pr-10 text-sm outline-none transition-colors rounded-md focus:ring-1 focus:ring-ring focus:border-ring">
              <button type="button" id="toggle-reg-confirm-password" aria-label="切换密码可见性" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors">
                <i data-lucide="eye" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
          <label class="flex items-start gap-2 cursor-pointer">
            <input type="checkbox" class="mt-0.5 shrink-0 rounded border-border bg-input">
            <span class="text-xs text-muted-foreground leading-relaxed">我已阅读并同意《用户协议》和《隐私政策》</span>
          </label>
          <button type="submit" class="w-full bg-primary text-primary-foreground font-medium text-sm py-2.5 rounded-md hover:opacity-90 transition-opacity cursor-pointer">立即注册</button>
        </form>
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-border"></div>
          <span class="text-xs text-muted-foreground whitespace-nowrap">其他注册方式</span>
          <div class="flex-1 h-px bg-border"></div>
        </div>
        <div class="flex items-center justify-center gap-3">
          <button type="button" class="w-10 h-10 flex items-center justify-center border border-border bg-card hover:bg-secondary hover:border-accent transition-colors rounded-md" aria-label="QQ注册">
            <svg class="w-4 h-4 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path><circle cx="9" cy="10" r="1.5" fill="currentColor" stroke="none"></circle><circle cx="15" cy="10" r="1.5" fill="currentColor" stroke="none"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path></svg>
          </button>
          <button type="button" class="w-10 h-10 flex items-center justify-center border border-border bg-card hover:bg-secondary hover:border-accent transition-colors rounded-md" aria-label="微信注册">
            <svg class="w-4 h-4 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"></path></svg>
          </button>
          <button type="button" class="w-10 h-10 flex items-center justify-center border border-border bg-card hover:bg-secondary hover:border-accent transition-colors rounded-md" aria-label="Google注册">
            <span class="text-sm font-medium text-muted-foreground">G</span>
          </button>
          <button type="button" class="w-10 h-10 flex items-center justify-center border border-border bg-card hover:bg-secondary hover:border-accent transition-colors rounded-md" aria-label="GitHub注册">
            <i data-lucide="github" class="w-4 h-4 text-muted-foreground"></i>
          </button>
        </div>
        <p class="text-center mt-6 text-xs text-muted-foreground">
          已有账号？<a href="#" data-dom-id="link-to-login" class="text-foreground hover:underline transition-colors">立即登录</a>
        </p>
      </div>
    </main>
    <script>
      (function() {
        document.getElementById('toggle-reg-password').addEventListener('click', function() {
          var input = document.getElementById('reg-password');
          if (input.type === 'password') {
            input.type = 'text';
            this.querySelector('[data-lucide]').setAttribute('data-lucide', 'eye-off');
          } else {
            input.type = 'password';
            this.querySelector('[data-lucide]').setAttribute('data-lucide', 'eye');
          }
          lucide.createIcons();
        });
        document.getElementById('toggle-reg-confirm-password').addEventListener('click', function() {
          var input = document.getElementById('reg-confirm-password');
          if (input.type === 'password') {
            input.type = 'text';
            this.querySelector('[data-lucide]').setAttribute('data-lucide', 'eye-off');
          } else {
            input.type = 'password';
            this.querySelector('[data-lucide]').setAttribute('data-lucide', 'eye');
          }
          lucide.createIcons();
        });
      })();
    </script>
    <script>lucide.createIcons();</script>
</body>
